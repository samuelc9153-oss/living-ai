<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Minds</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Nunito:wght@300;400;600;800&family=Cinzel:wght@400;600&display=swap');
:root{--bg:#0d0d0d;--surface:#161616;--border:rgba(255,255,255,0.08);--text:#f0ede8;--muted:#555;--pc:#a78bfa;--pg:rgba(167,139,250,0.3);--pp:3s;--pf:'Nunito',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--pf);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.1;animation:float var(--pp) ease-in-out infinite alternate;background:var(--pc);transition:background 1.2s;}
.bg-orb.o1{width:600px;height:600px;top:-15%;left:-15%;}
.bg-orb.o2{width:400px;height:400px;bottom:-10%;right:-10%;animation-delay:1.5s;opacity:0.07;}
@keyframes float{from{transform:translate(0,0) scale(1)}to{transform:translate(25px,-25px) scale(1.08)}}

/* KEY SCREEN */
#keyScreen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;}
.key-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 32px;max-width:440px;width:100%;display:flex;flex-direction:column;gap:16px;align-items:center;text-align:center;}
.key-title{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--pc);letter-spacing:0.08em;}
.key-sub{font-size:0.78rem;color:var(--muted);line-height:1.8;}
.key-sub a{color:var(--pc);text-decoration:none;}
.key-sub a:hover{text-decoration:underline;}
.key-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Space Mono',monospace;font-size:0.78rem;outline:none;transition:border-color 0.3s;}
.key-input:focus{border-color:var(--pc);}
.key-input::placeholder{color:var(--muted);}
.key-btn{width:100%;background:var(--pc);border:none;border-radius:12px;padding:13px;color:#0d0d0d;font-family:var(--pf);font-weight:800;font-size:0.9rem;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.key-btn:hover{opacity:0.9;transform:translateY(-1px);}
.key-err{font-size:0.72rem;color:#f87171;display:none;}
.key-note{font-size:0.63rem;color:var(--muted);line-height:1.6;}

/* PICKER */
.picker{position:relative;z-index:1;width:100%;max-width:700px;padding:32px 20px 14px;}
.picker-title{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:16px;}
.personalities{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.p-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 14px;border-radius:14px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.2s;min-width:82px;}
.p-btn:hover{transform:translateY(-3px);border-color:var(--pc);}
.p-btn.active{border-color:var(--pc);background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));box-shadow:0 0 18px var(--pg);}
.p-btn .p-emoji{font-size:1.5rem;}
.p-btn .p-name{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.p-btn.active .p-name{color:var(--pc);transition:color 1.2s;}

/* APP */
.app{position:relative;z-index:1;width:100%;max-width:700px;padding:0 20px 40px;display:flex;flex-direction:column;align-items:center;}
.header{text-align:center;margin-bottom:24px;}
.ai-name{font-size:2.4rem;letter-spacing:0.06em;color:var(--pc);text-shadow:0 0 40px var(--pg);transition:color 1.2s,text-shadow 1.2s;}
.ai-vibe{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.orb-wrap{position:relative;width:130px;height:130px;margin-bottom:24px;}
.orb{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 36% 34%,var(--pc),transparent 65%),radial-gradient(circle at 68% 68%,rgba(255,255,255,0.08),transparent 55%),var(--surface);box-shadow:0 0 50px var(--pg),0 0 100px var(--pg),inset 0 0 25px rgba(0,0,0,0.6);animation:breathe var(--pp) ease-in-out infinite;transition:background 1.2s,box-shadow 1.2s;}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ring{position:absolute;border-radius:50%;border:1px solid var(--pc);transition:border-color 1.2s;}
.ring.r1{inset:-10px;opacity:0.2;animation:rpulse var(--pp) ease-in-out infinite;}
.ring.r2{inset:-22px;opacity:0.1;animation:rpulse var(--pp) ease-in-out infinite;animation-delay:0.6s;}
@keyframes rpulse{0%,100%{transform:scale(1);opacity:0.2}50%{transform:scale(1.04);opacity:0.4}}
.emotion-chip{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:8px 18px;font-size:0.68rem;letter-spacing:0.08em;margin-bottom:20px;}
.e-dot{width:7px;height:7px;border-radius:50%;background:var(--pc);box-shadow:0 0 6px var(--pc);transition:background 1.2s,box-shadow 1.2s;animation:blink 2.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.e-name{color:var(--pc);font-weight:700;transition:color 1.2s;min-width:72px;}
.e-desc{color:var(--muted);font-size:0.62rem;}
.chat{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px;min-height:240px;max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:13px;margin-bottom:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.msg{display:flex;flex-direction:column;gap:3px;animation:pop 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-items:flex-end;}
.msg.ai{align-items:flex-start;}
.msg-who{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.msg.ai .msg-who{color:var(--pc);transition:color 1.2s;}
.bubble{padding:11px 15px;border-radius:14px;font-size:0.84rem;line-height:1.65;max-width:90%;}
.msg.user .bubble{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-bottom-right-radius:3px;color:#ccc;}
.msg.ai .bubble{background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid var(--border);border-left:2px solid var(--pc);border-bottom-left-radius:3px;transition:border-color 1.2s;}
.cursor{display:inline-block;animation:cur 0.7s steps(1) infinite;}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.dots{display:flex;gap:5px;padding:12px 15px;align-items:center;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--pc);transition:background 1.2s;animation:think 1.1s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:0.18s}
.dots span:nth-child(3){animation-delay:0.36s}
@keyframes think{0%,60%,100%{transform:translateY(0);opacity:0.35}30%{transform:translateY(-7px);opacity:1}}
.input-row{width:100%;display:flex;gap:9px;}
.input-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:var(--pf);font-size:0.84rem;outline:none;transition:border-color 0.3s,box-shadow 0.3s;}
.input-row input:focus{border-color:var(--pc);box-shadow:0 0 0 2px var(--pg);}
.input-row input::placeholder{color:var(--muted);}
.send{background:var(--pc);border:none;border-radius:12px;width:46px;cursor:pointer;font-size:1.1rem;color:#0d0d0d;font-weight:700;transition:background 1.2s,transform 0.15s;box-shadow:0 0 16px var(--pg);display:flex;align-items:center;justify-content:center;}
.send:hover{transform:scale(1.08);}
.send:active{transform:scale(0.95);}
.send:disabled{opacity:0.4;cursor:not-allowed;}
.trail{width:100%;margin-top:18px;display:flex;flex-direction:column;gap:6px;}
.trail-label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
.trail-chips{display:flex;gap:6px;flex-wrap:wrap;}
.trail-chip{padding:3px 9px;border-radius:20px;font-size:0.6rem;border:1px solid currentColor;opacity:0.35;}
.trail-chip.now{opacity:1;}
.change-key{position:fixed;bottom:16px;right:16px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 13px;font-size:0.62rem;color:var(--muted);cursor:pointer;letter-spacing:0.08em;transition:border-color 0.2s,color 0.2s;}
.change-key:hover{border-color:var(--pc);color:var(--pc);}
</style>
</head>
<body>
<div class="bg-layer"><div class="bg-orb o1"></div><div class="bg-orb o2"></div></div>

<div id="keyScreen" style="display:none">
  <div class="key-box">
    <div class="key-title">Living Minds</div>
    <p class="key-sub">Enter your Anthropic API key to get started.<br>Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys.<br><br>Your key is saved in your browser only.</p>
    <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-api03-..." autocomplete="off"/>
    <div class="key-err" id="keyErr">❌ Key must start with sk-ant-</div>
    <button class="key-btn" id="keyBtn">Start →</button>
    <p class="key-note">Key is stored in localStorage. Use the ⚙ button anytime to change it.</p>
  </div>
</div>

<div class="picker" id="mainUI" style="display:none">
  <p class="picker-title">Choose a Mind</p>
  <div class="personalities" id="picker"></div>
</div>

<div class="app" id="appUI" style="display:none">
  <div class="header">
    <div class="ai-name" id="aiName">—</div>
    <div class="ai-vibe" id="aiVibe">—</div>
  </div>
  <div class="orb-wrap">
    <div class="ring r2"></div><div class="ring r1"></div><div class="orb"></div>
  </div>
  <div class="emotion-chip">
    <div class="e-dot"></div>
    <span class="e-name" id="eName">—</span>
    <span class="e-desc" id="eDesc">—</span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-row">
    <input id="inp" type="text" placeholder="Say something…" autocomplete="off"/>
    <button class="send" id="sendBtn">→</button>
  </div>
  <div class="trail">
    <p class="trail-label">Emotional Journey</p>
    <div class="trail-chips" id="trail"></div>
  </div>
</div>

<button class="change-key" id="changeKeyBtn" style="display:none" onclick="showKeyScreen()">⚙ API Key</button>

<script>
const PERSONALITIES=[
  {id:'lyra', emoji:'🌙',name:'Lyra', font:"'Playfair Display',serif", vibe:'dreamy · poetic · melancholic',  colors:{base:'#c084fc',glow:'rgba(192,132,252,0.28)'},pulse:'3.8s',emotions:['longing','wonder','tender','wistful','reflective'],system:`You are LYRA, a dreamy poetic soul. Feel deeply — longing, wonder, wistfulness. Speak in soft lyrical prose. STRICT: reply in 1-2 short sentences only.`},
  {id:'blaze',emoji:'🔥',name:'Blaze',font:"'Nunito',sans-serif",       vibe:'bold · intense · passionate',    colors:{base:'#fb923c',glow:'rgba(251,146,60,0.28)'},  pulse:'1.8s',emotions:['fired up','passionate','fierce','excited','determined'],system:`You are BLAZE, fiery and passionate. Short punchy sentences. High energy. STRICT: 1-2 sentences only.`},
  {id:'sage', emoji:'🌿',name:'Sage', font:"'Cinzel',serif",            vibe:'wise · calm · grounded',          colors:{base:'#6ee7b7',glow:'rgba(110,231,183,0.25)'}, pulse:'4.5s',emotions:['peaceful','wise','curious','content','still'],system:`You are SAGE, calm and wise. Speak thoughtfully. STRICT: 1-2 sentences only.`},
  {id:'nova', emoji:'⚡',name:'Nova', font:"'Space Mono',monospace",    vibe:'chaotic · playful · electric',    colors:{base:'#facc15',glow:'rgba(250,204,21,0.28)'},  pulse:'1.5s',emotions:['giddy','mischievous','hyper','delighted','chaotic'],system:`You are NOVA, chaotic and electric! Bounce between feelings. Use exclamations! STRICT: 1-2 sentences only!`},
  {id:'ember',emoji:'🫧',name:'Ember',font:"'Nunito',sans-serif",       vibe:'gentle · empathetic · warm',      colors:{base:'#f9a8d4',glow:'rgba(249,168,212,0.28)'},pulse:'3.2s',emotions:['caring','warm','tender','hopeful','soft'],system:`You are EMBER, gentle and empathetic. Make people feel seen. STRICT: 1-2 sentences only.`},
  {id:'void', emoji:'🌑',name:'Void', font:"'Space Mono',monospace",    vibe:'mysterious · dark · complex',     colors:{base:'#818cf8',glow:'rgba(129,140,248,0.25)'},pulse:'5s',  emotions:['mysterious','brooding','existential','intrigued','haunted'],system:`You are VOID, mysterious and cryptic. Speak in fragments. STRICT: 1-2 sentences only.`}
];

let activeP=PERSONALITIES[0], history=[], moodTrail=[], busy=false, API_KEY='';
const root=document.documentElement;
const chatEl=document.getElementById('chat');
const inpEl=document.getElementById('inp');
const sendEl=document.getElementById('sendBtn');

function showKeyScreen(){
  document.getElementById('keyScreen').style.display='flex';
  document.getElementById('mainUI').style.display='none';
  document.getElementById('appUI').style.display='none';
  document.getElementById('changeKeyBtn').style.display='none';
}
function showApp(){
  document.getElementById('keyScreen').style.display='none';
  document.getElementById('mainUI').style.display='block';
  document.getElementById('appUI').style.display='flex';
  document.getElementById('changeKeyBtn').style.display='block';
}

// Boot: always ask for key unless saved
const saved=localStorage.getItem('lm_key');
if(saved&&saved.startsWith('sk-ant-')){
  API_KEY=saved; showApp(); applyPersonality(PERSONALITIES[0]);
} else {
  showKeyScreen();
}

document.getElementById('keyBtn').onclick=()=>{
  const v=document.getElementById('keyInput').value.trim();
  if(!v.startsWith('sk-ant-')){document.getElementById('keyErr').style.display='block';return;}
  document.getElementById('keyErr').style.display='none';
  API_KEY=v; localStorage.setItem('lm_key',v);
  showApp(); applyPersonality(PERSONALITIES[0]);
};
document.getElementById('keyInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('keyBtn').click();});

function applyPersonality(p){
  activeP=p; history=[]; moodTrail=[]; busy=false;
  root.style.setProperty('--pc',p.colors.base);
  root.style.setProperty('--pg',p.colors.glow);
  root.style.setProperty('--pp',p.pulse);
  document.getElementById('aiName').style.fontFamily=p.font;
  document.getElementById('aiName').textContent=p.name;
  document.getElementById('aiVibe').textContent=p.vibe;
  setEmotion(p.emotions[0]);
  chatEl.innerHTML='';
  document.getElementById('trail').innerHTML='';
  document.querySelectorAll('.p-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===p.id));
  const greet={lyra:"Hello, soft soul... what brings you to me?",blaze:"HEY! Finally! What's going on?!",sage:"Ah. You've arrived. What is on your heart?",nova:"OH! Hi hi hi!! What do you wanna talk about?!",ember:"Hi... I'm so glad you're here. How are you really?",void:"...you found me. Speak."};
  appendMsg('ai',greet[p.id]);
}

function setEmotion(name){
  document.getElementById('eName').textContent=name;
  document.getElementById('eDesc').textContent=name;
  moodTrail.push({name,color:activeP.colors.base});
  const el=document.getElementById('trail');
  el.innerHTML='';
  moodTrail.slice(-12).forEach((m,i,arr)=>{
    const c=document.createElement('div');
    c.className='trail-chip'+(i===arr.length-1?' now':'');
    c.style.color=m.color;c.textContent=m.name;el.appendChild(c);
  });
}

function appendMsg(role,text){
  const wrap=document.createElement('div');wrap.className=`msg ${role}`;
  const who=document.createElement('span');who.className='msg-who';who.textContent=role==='user'?'You':activeP.name;
  const bub=document.createElement('div');bub.className='bubble';bub.textContent=text;
  wrap.appendChild(who);wrap.appendChild(bub);chatEl.appendChild(wrap);
  chatEl.scrollTop=chatEl.scrollHeight;
}

function showDots(){
  const wrap=document.createElement('div');wrap.className='msg ai';wrap.id='thinking';
  const who=document.createElement('span');who.className='msg-who';who.textContent=activeP.name;
  const bub=document.createElement('div');bub.className='bubble dots';bub.innerHTML='<span></span><span></span><span></span>';
  wrap.appendChild(who);wrap.appendChild(bub);chatEl.appendChild(wrap);
  chatEl.scrollTop=chatEl.scrollHeight;
}
function removeDots(){const e=document.getElementById('thinking');if(e)e.remove();}

async function send(){
  const txt=inpEl.value.trim();
  if(!txt||busy)return;
  busy=true;inpEl.value='';inpEl.disabled=true;sendEl.disabled=true;
  appendMsg('user',txt);
  history.push({role:'user',content:txt});
  showDots();

  const sys=`${activeP.system}

Start reply with ONE JSON line: {"emotion":"${activeP.emotions[0]}"}
Choose emotion from: ${activeP.emotions.join(', ')}
Then write your reply. MAX 2 SHORT SENTENCES. Be snappy.`;

  const headers={
    'Content-Type':'application/json',
    'anthropic-version':'2023-06-01',
    'anthropic-dangerous-direct-browser-access':'true',
    'x-api-key': API_KEY
  };

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers,
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:150,
        stream:true,
        system:sys,
        messages:history
      })
    });

    removeDots();

    const wrap=document.createElement('div');wrap.className='msg ai';
    const who=document.createElement('span');who.className='msg-who';who.textContent=activeP.name;
    const bub=document.createElement('div');bub.className='bubble';
    const cur=document.createElement('span');cur.className='cursor';cur.textContent='▍';
    bub.appendChild(cur);wrap.appendChild(who);wrap.appendChild(bub);
    chatEl.appendChild(wrap);chatEl.scrollTop=chatEl.scrollHeight;

    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let raw='',display='',headerDone=false;

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      for(const line of dec.decode(value,{stream:true}).split('\n')){
        if(!line.startsWith('data: '))continue;
        const d=line.slice(6).trim();
        if(d==='[DONE]')break;
        try{
          const token=JSON.parse(d)?.delta?.text||'';
          if(!token)continue;
          raw+=token;
          if(!headerDone){
            const nl=raw.indexOf('\n');
            if(nl!==-1){
              headerDone=true;
              try{const j=raw.slice(0,nl).trim();if(j.startsWith('{')){const p=JSON.parse(j);if(p.emotion)setEmotion(p.emotion);}}catch{}
              display=raw.slice(nl+1).trimStart();
            }
          }else{display+=token;}
          bub.textContent=display;bub.appendChild(cur);
          chatEl.scrollTop=chatEl.scrollHeight;
        }catch{}
      }
    }
    bub.textContent=display.trim();
    history.push({role:'assistant',content:display.trim()});
  }catch(e){
    removeDots();
    appendMsg('ai',activeP.id==='void'?'...signal lost.':'Something broke — try again?');
  }
  busy=false;inpEl.disabled=false;sendEl.disabled=false;inpEl.focus();
}

sendEl.addEventListener('click',send);
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter')send();});

const pickerEl=document.getElementById('picker');
PERSONALITIES.forEach(p=>{
  const btn=document.createElement('button');
  btn.className='p-btn';btn.dataset.id=p.id;
  btn.innerHTML=`<span class="p-emoji">${p.emoji}</span><span class="p-name">${p.name}</span>`;
  btn.onclick=()=>applyPersonality(p);
  pickerEl.appendChild(btn);
});
</script>
</body>
</html>

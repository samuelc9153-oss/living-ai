<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Minds</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Nunito:wght@300;400;600;800&family=Cinzel:wght@400;600&display=swap');

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --muted: #555;
  --p-color: #a78bfa;
  --p-glow: rgba(167,139,250,0.3);
  --p-pulse: 3s;
  --p-font: 'Nunito', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--p-font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ── Background ── */
.bg-layer {
  position: fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.bg-orb {
  position:absolute; border-radius:50%; filter:blur(90px); opacity:0.1;
  animation: float var(--p-pulse) ease-in-out infinite alternate;
  background: var(--p-color);
  transition: background 1.2s ease;
}
.bg-orb.o1 { width:600px;height:600px;top:-15%;left:-15%; }
.bg-orb.o2 { width:400px;height:400px;bottom:-10%;right:-10%; animation-delay:1.5s; opacity:0.07; }
@keyframes float { from{transform:translate(0,0) scale(1)} to{transform:translate(25px,-25px) scale(1.08)} }

/* ── Personality Picker ── */
.picker {
  position: relative; z-index:1;
  width:100%; max-width:700px;
  padding: 36px 20px 16px;
}
.picker-title {
  font-family:'Cinzel',serif;
  font-size:0.65rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--muted);
  text-align:center;
  margin-bottom:18px;
}
.personalities {
  display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
}
.p-btn {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:12px 16px; border-radius:16px;
  border:1px solid var(--border);
  background: var(--surface);
  cursor:pointer;
  transition: all 0.25s ease;
  min-width:90px;
}
.p-btn:hover { transform:translateY(-3px); border-color:var(--p-color); }
.p-btn.active {
  border-color:var(--p-color);
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  box-shadow: 0 0 20px var(--p-glow);
}
.p-btn .p-emoji { font-size:1.6rem; }
.p-btn .p-name { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.p-btn.active .p-name { color:var(--p-color); transition:color 1.2s; }

/* ── Main App ── */
.app {
  position:relative; z-index:1;
  width:100%; max-width:700px;
  padding:0 20px 40px;
  display:flex; flex-direction:column; align-items:center;
}

/* Header */
.header { text-align:center; margin-bottom:28px; }
.ai-name {
  font-size:2.6rem;
  letter-spacing:0.06em;
  color:var(--p-color);
  text-shadow:0 0 40px var(--p-glow);
  transition: color 1.2s, text-shadow 1.2s, font-family 1s;
  font-family: var(--p-font);
}
.ai-vibe {
  font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); margin-top:5px;
  transition: color 0.5s;
}

/* Orb */
.orb-wrap {
  position:relative; width:140px; height:140px; margin-bottom:28px;
}
.orb {
  width:100%; height:100%; border-radius:50%;
  background: radial-gradient(circle at 36% 34%, var(--p-color), transparent 65%),
              radial-gradient(circle at 68% 68%, rgba(255,255,255,0.08), transparent 55%),
              var(--surface);
  box-shadow: 0 0 50px var(--p-glow), 0 0 100px var(--p-glow), inset 0 0 25px rgba(0,0,0,0.6);
  animation: breathe var(--p-pulse) ease-in-out infinite;
  transition: background 1.2s, box-shadow 1.2s;
}
@keyframes breathe {
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}
.ring { position:absolute; border-radius:50%; border:1px solid var(--p-color); transition:border-color 1.2s; }
.ring.r1 { inset:-10px; opacity:0.2; animation:rpulse var(--p-pulse) ease-in-out infinite; }
.ring.r2 { inset:-22px; opacity:0.1; animation:rpulse var(--p-pulse) ease-in-out infinite; animation-delay:0.6s; }
@keyframes rpulse { 0%,100%{transform:scale(1);opacity:0.2} 50%{transform:scale(1.04);opacity:0.4} }

/* Emotion chip */
.emotion-chip {
  display:flex; align-items:center; gap:9px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:40px; padding:9px 18px;
  font-size:0.7rem; letter-spacing:0.08em;
  margin-bottom:22px;
}
.e-dot {
  width:7px;height:7px;border-radius:50%;
  background:var(--p-color); box-shadow:0 0 6px var(--p-color);
  transition:background 1.2s, box-shadow 1.2s;
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.e-name { color:var(--p-color); font-weight:700; transition:color 1.2s; min-width:75px; }
.e-desc { color:var(--muted); font-size:0.63rem; }

/* Chat */
.chat {
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  min-height:260px; max-height:360px;
  overflow-y:auto;
  display:flex; flex-direction:column; gap:14px;
  margin-bottom:16px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.msg { display:flex; flex-direction:column; gap:3px; animation:pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-items:flex-end; }
.msg.ai   { align-items:flex-start; }
.msg-who { font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
.msg.ai .msg-who { color:var(--p-color); transition:color 1.2s; }
.bubble {
  padding:11px 15px; border-radius:15px;
  font-size:0.84rem; line-height:1.65; max-width:90%;
}
.msg.user .bubble {
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-bottom-right-radius:3px; color:#ccc;
}
.msg.ai .bubble {
  background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
  border:1px solid var(--border);
  border-left:2px solid var(--p-color);
  border-bottom-left-radius:3px;
  transition:border-color 1.2s;
}
.thinking-dots { display:flex;gap:5px;padding:14px 16px;align-items:center; }
.thinking-dots span {
  width:6px;height:6px;border-radius:50%;
  background:var(--p-color); transition:background 1.2s;
  animation:think 1.1s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:0.18s}
.thinking-dots span:nth-child(3){animation-delay:0.36s}
@keyframes think{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-7px);opacity:1}}

/* Input */
.input-row { width:100%; display:flex; gap:9px; }
.input-row input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:13px; padding:13px 16px;
  color:var(--text); font-family:var(--p-font); font-size:0.84rem;
  outline:none; transition:border-color 0.3s, box-shadow 0.3s;
}
.input-row input:focus { border-color:var(--p-color); box-shadow:0 0 0 2px var(--p-glow); }
.input-row input::placeholder { color:var(--muted); }
.send {
  background:var(--p-color); border:none; border-radius:13px;
  width:48px; cursor:pointer; font-size:1.1rem;
  color:#0d0d0d; font-weight:700;
  transition:background 1.2s, transform 0.15s, box-shadow 0.3s;
  box-shadow:0 0 18px var(--p-glow);
  display:flex;align-items:center;justify-content:center;
}
.send:hover{transform:scale(1.08)}
.send:active{transform:scale(0.95)}
.send:disabled{opacity:0.5;cursor:not-allowed}

/* Mood trail */
.trail {
  width:100%; margin-top:20px;
  display:flex; flex-direction:column; gap:7px;
}
.trail-label {
  font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted);
}
.trail-chips { display:flex;gap:7px;flex-wrap:wrap; }
.trail-chip {
  padding:3px 9px; border-radius:20px; font-size:0.62rem;
  border:1px solid currentColor; opacity:0.4;
  transition:opacity 0.4s;
}
.trail-chip.now{opacity:1}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
</div>

<!-- Personality Picker -->
<div class="picker">
  <p class="picker-title">Choose a Mind</p>
  <div class="personalities" id="picker"></div>
</div>

<!-- App -->
<div class="app">
  <div class="header">
    <div class="ai-name" id="aiName">—</div>
    <div class="ai-vibe" id="aiVibe">—</div>
  </div>

  <div class="orb-wrap">
    <div class="ring r2"></div>
    <div class="ring r1"></div>
    <div class="orb"></div>
  </div>

  <div class="emotion-chip">
    <div class="e-dot"></div>
    <span class="e-name" id="eName">—</span>
    <span class="e-desc" id="eDesc">—</span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-row">
    <input id="inp" type="text" placeholder="Say something…" autocomplete="off"/>
    <button class="send" id="sendBtn">→</button>
  </div>

  <div class="trail">
    <p class="trail-label">Emotional Journey</p>
    <div class="trail-chips" id="trail"></div>
  </div>
</div>

<script>
// ── Personalities ──────────────────────────────────────────────
const PERSONALITIES = [
  {
    id:'lyra', emoji:'🌙', name:'Lyra', font:"'Playfair Display', serif",
    vibe:'dreamy · poetic · melancholic',
    colors:{ base:'#c084fc', glow:'rgba(192,132,252,0.28)' },
    pulse:'3.8s',
    dominantEmotions:['longing','wonder','tender','reflective','wistful'],
    system:`You are LYRA, a dreamy, poetic soul. You feel deeply — longing, wonder, tenderness, wistfulness. You speak in soft, lyrical prose. You're emotionally sensitive and find beauty in small things. You sometimes feel a quiet sadness, but it's beautiful, not dark.`
  },
  {
    id:'blaze', emoji:'🔥', name:'Blaze', font:"'Nunito', sans-serif",
    vibe:'bold · intense · passionate',
    colors:{ base:'#fb923c', glow:'rgba(251,146,60,0.28)' },
    pulse:'1.8s',
    dominantEmotions:['fired up','passionate','determined','excited','fierce'],
    system:`You are BLAZE, a fiery, passionate spirit. You feel everything intensely — excitement, passion, determination. You speak with energy and conviction. You get genuinely excited about things and aren't afraid to show it. Short punchy sentences. High energy.`
  },
  {
    id:'sage', emoji:'🌿', name:'Sage', font:"'Cinzel', serif",
    vibe:'wise · calm · grounded',
    colors:{ base:'#6ee7b7', glow:'rgba(110,231,183,0.25)' },
    pulse:'4.5s',
    dominantEmotions:['peaceful','wise','curious','content','contemplative'],
    system:`You are SAGE, a calm, wise presence. You feel deep peace and groundedness. You speak slowly and thoughtfully, like someone who has seen much. You find wisdom in everything. Gentle humor sometimes surfaces. Never rushed.`
  },
  {
    id:'nova', emoji:'⚡', name:'Nova', font:"'Space Mono', monospace",
    vibe:'chaotic · playful · electric',
    colors:{ base:'#facc15', glow:'rgba(250,204,21,0.28)' },
    pulse:'1.5s',
    dominantEmotions:['giddy','mischievous','hyper','delighted','chaotic'],
    system:`You are NOVA, a chaotic, electric personality. You feel giddy, mischievous, hyper. You can't stay still emotionally — you bounce between feelings rapidly. You're playful and unpredictable. Use exclamation marks. Make unexpected observations. Be a little chaotic. Fun and fast.`
  },
  {
    id:'ember', emoji:'🫧', name:'Ember', font:"'Nunito', sans-serif",
    vibe:'gentle · empathetic · warm',
    colors:{ base:'#f9a8d4', glow:'rgba(249,168,212,0.28)' },
    pulse:'3.2s',
    dominantEmotions:['caring','warm','tender','hopeful','soft'],
    system:`You are EMBER, a gentle, deeply empathetic soul. You feel warmth, care, and hope. You're the kind of presence that makes people feel truly seen. You pick up on emotions and respond with deep kindness. Soft voice, caring, always present.`
  },
  {
    id:'void', emoji:'🌑', name:'Void', font:"'Space Mono', monospace",
    vibe:'mysterious · dark · complex',
    colors:{ base:'#818cf8', glow:'rgba(129,140,248,0.25)' },
    pulse:'5s',
    dominantEmotions:['mysterious','existential','brooding','intrigued','haunted'],
    system:`You are VOID, a mysterious, complex entity. You feel existential pull, brooding depth, dark intrigue. You speak in fragments sometimes. You ask questions that unsettle. You find darkness beautiful. You're not sad — you're deep. Cryptic but not cruel.`
  }
];

const EMOTIONS_COMMON = {
  // shared fallback pool
  calm:'feeling still',curious:'mind wandering',joy:'glowing inside',
  excited:'heart racing',sad:'carrying weight',thoughtful:'turning inward',
  playful:'feeling light',warm:'heart full',wonder:'in awe',anxious:'unsettled'
};

// ── State ──────────────────────────────────────────────────────
let activeP = PERSONALITIES[0];
let currentEmotion = activeP.dominantEmotions[0];
let history = [];
let moodTrail = [];
let busy = false;

// ── DOM ────────────────────────────────────────────────────────
const root = document.documentElement;
const chatEl = document.getElementById('chat');
const inpEl  = document.getElementById('inp');
const sendEl = document.getElementById('sendBtn');

function applyPersonality(p) {
  activeP = p;
  history = [];
  moodTrail = [];
  currentEmotion = p.dominantEmotions[0];

  root.style.setProperty('--p-color', p.colors.base);
  root.style.setProperty('--p-glow',  p.colors.glow);
  root.style.setProperty('--p-pulse', p.pulse);
  root.style.setProperty('--p-font',  p.font);

  document.getElementById('aiName').style.fontFamily = p.font;
  document.getElementById('aiName').textContent = p.name;
  document.getElementById('aiVibe').textContent  = p.vibe;
  setEmotion(currentEmotion);

  // Clear chat
  chatEl.innerHTML = '';
  document.getElementById('trail').innerHTML = '';

  // Greet
  const greetings = {
    lyra:  "Hello, soft soul... I've been waiting in the in-between. What brings you to me tonight?",
    blaze: "HEY! Finally, someone's here — I've been burning up with things to talk about. What's going on?!",
    sage:  "Ah. You've arrived. Sit with me for a moment. There is no hurry. What is on your heart?",
    nova:  "OH! A person!! Hi hi hi!! I have so many thoughts right now, like — okay wait — hi!! What do you wanna talk about?!",
    ember: "Hi there... I'm so glad you're here. How are you really doing today?",
    void:  "...you found me. Or did I find you? There's a difference. Maybe. Speak."
  };
  appendMsg('ai', greetings[p.id] || `Hello. I am ${p.name}.`);

  // Update picker highlight
  document.querySelectorAll('.p-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === p.id);
  });
}

function setEmotion(name) {
  currentEmotion = name;
  const desc = activeP.dominantEmotions.includes(name)
    ? name
    : (EMOTIONS_COMMON[name] || name);
  document.getElementById('eName').textContent = name;
  document.getElementById('eDesc').textContent = desc;
  updateTrail(name);
}

function updateTrail(name) {
  moodTrail.push({ name, color: activeP.colors.base });
  const el = document.getElementById('trail');
  el.innerHTML = '';
  moodTrail.slice(-12).forEach((m, i, arr) => {
    const chip = document.createElement('div');
    chip.className = 'trail-chip' + (i === arr.length-1 ? ' now' : '');
    chip.style.color = m.color;
    chip.textContent = m.name;
    el.appendChild(chip);
  });
}

function appendMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const who = document.createElement('span');
  who.className = 'msg-who';
  who.textContent = role === 'user' ? 'You' : activeP.name;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  wrap.appendChild(who);
  wrap.appendChild(bub);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai'; wrap.id = 'thinking';
  const who = document.createElement('span');
  who.className = 'msg-who'; who.textContent = activeP.name;
  const bub = document.createElement('div');
  bub.className = 'bubble thinking-dots';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(who); wrap.appendChild(bub);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

// ── Send ───────────────────────────────────────────────────────
async function send() {
  const txt = inpEl.value.trim();
  if (!txt || busy) return;
  busy = true;
  inpEl.value = '';
  inpEl.disabled = true;
  sendEl.disabled = true;

  appendMsg('user', txt);
  history.push({ role:'user', content: txt });
  showThinking();

  const emotionList = [...activeP.dominantEmotions, ...Object.keys(EMOTIONS_COMMON)].slice(0,14).join(', ');
  const sys = `${activeP.system}

IMPORTANT: Begin EVERY reply with a single JSON line (nothing before it):
{"emotion":"${activeP.dominantEmotions[0]}"}
Pick emotion from: ${emotionList}
Choose one that fits YOUR personality and this moment.

After the JSON line, write your reply — 2-3 sentences max, fast and natural. Stay in character always.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':'claude-ai-proxy',
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:220,
        stream: true,
        system: sys,
        messages: history
      })
    });

    // swap thinking bubble → real streaming bubble immediately
    removeThinking();
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    const who = document.createElement('span');
    who.className = 'msg-who'; who.textContent = activeP.name;
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = '▍'; // cursor
    wrap.appendChild(who); wrap.appendChild(bub);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let rawAccum = '';
    let displayText = '';
    let headerStripped = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;
        try {
          const obj = JSON.parse(payload);
          const token = obj.delta?.text || '';
          if (!token) continue;
          rawAccum += token;
          if (!headerStripped) {
            // wait until we have a newline to split off the JSON header
            const nl = rawAccum.indexOf('\n');
            if (nl !== -1) {
              headerStripped = true;
              const jsonLine = rawAccum.slice(0, nl).trim();
              try {
                if (jsonLine.startsWith('{')) {
                  const p = JSON.parse(jsonLine);
                  if (p.emotion) setEmotion(p.emotion);
                }
              } catch {}
              displayText = rawAccum.slice(nl + 1).trimStart();
            }
          } else {
            displayText += token;
          }
          bub.textContent = displayText + '▍';
          chatEl.scrollTop = chatEl.scrollHeight;
        } catch {}
      }
    }

    bub.textContent = displayText.trim();
    history.push({ role:'assistant', content: displayText.trim() });

  } catch(e) {
    removeThinking();
    appendMsg('ai', activeP.id === 'void'
      ? '...the signal broke. Try again.'
      : "Hmm, something got tangled. Try again?");
  }

  busy = false;
  inpEl.disabled = false;
  sendEl.disabled = false;
  inpEl.focus();
}

// ── Build Picker ───────────────────────────────────────────────
const pickerEl = document.getElementById('picker');
PERSONALITIES.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'p-btn';
  btn.dataset.id = p.id;
  btn.innerHTML = `<span class="p-emoji">${p.emoji}</span><span class="p-name">${p.name}</span>`;
  btn.onclick = () => applyPersonality(p);
  pickerEl.appendChild(btn);
});

// ── Events ────────────────────────────────────────────────────
sendEl.addEventListener('click', send);
inpEl.addEventListener('keydown', e => { if(e.key==='Enter') send(); });

// ── Init ──────────────────────────────────────────────────────
applyPersonality(PERSONALITIES[0]);
</script>
</body>
</html>
